services:
  db:
    image: postgres:16.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - shared-volume:/data
    ports:
      - 5432:5432
  web:
    build:
      context: .
    command: bash -c "rm -f tmp/pids/server.pid && bin/dev"
    depends_on:
      - db
    env_file:
      .env
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - .:/home/app/myapp

volumes:
  postgres-data:
  shared-volume: